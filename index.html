<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Et si ... - Animations Interactives</title>
    
    <link rel="icon" type="image/png" href="favicon.png?v=2">
    <link rel="apple-touch-icon" href="favicon.png?v=2">

    <style>
        /* Base sombre Lab Pro */
        body { 
            font-family: 'Segoe UI', 'Quicksand', sans-serif; 
            margin: 0; 
            background: #0a0f1e; 
            color: #f8fafc; 
            min-height: 100vh;
        }

        header { 
            background: rgba(30, 41, 59, 0.5); 
            color: white; 
            padding: 4rem 1rem; 
            text-align: center; 
            border-bottom: 1px solid #1e293b;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        header h1 { font-size: 3rem; margin: 0; color: #38bdf8; }
        header p { color: #94a3b8; font-weight: 300; }
        
        /* Navigation Lab Pro */
        nav { 
            margin: -30px 40px 0; 
            background: rgba(15, 23, 42, 0.9); 
            backdrop-filter: blur(15px); 
            border-radius: 12px; 
            display: flex; 
            justify-content: center; 
            flex-wrap: wrap; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            border: 1px solid #1e293b;
            overflow: visible; 
        }

        .menu-item { 
            position: relative; 
            padding: 20px 30px; 
            color: #94a3b8; 
            cursor: pointer; 
            font-weight: 600; 
            transition: 0.3s;
        }

        .menu-item:hover { color: #38bdf8; }
        
        /* Dropdowns stylisés */
        .dropdown { 
            display: none; 
            position: absolute; 
            top: 100%; 
            left: 0; 
            background: #1e293b; 
            min-width: 250px; 
            border-radius: 8px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.4); 
            padding: 10px 0; 
            border: 1px solid #334155;
            z-index: 100;
        }

        .dropdown a { 
            color: #cbd5e1; 
            padding: 12px 20px; 
            text-decoration: none; 
            display: block; 
            transition: 0.2s; 
            font-size: 0.9rem;
        }

        .dropdown a:hover { 
            background: rgba(56, 189, 248, 0.1); 
            color: #38bdf8; 
            padding-left: 25px;
        }

        .menu-item:hover .dropdown { display: block; }

        /* Section Hero */
        .hero { 
            padding: 120px 20px; 
            text-align: center; 
            background: radial-gradient(circle at center, rgba(56, 189, 248, 0.05) 0%, transparent 70%);
        }

        .hero h2 { font-size: 2.5rem; color: #f8fafc; margin-bottom: 20px; }
        .hero p { font-size: 1.2rem; color: #94a3b8; max-width: 600px; margin: 0 auto; }

        @media (max-width: 768px) {
            nav { flex-direction: column; margin: 10px; }
            .dropdown { position: static; box-shadow: none; background: transparent; border: none; }
            .menu-item { padding: 15px; border-bottom: 1px solid #1e293b; }
        }
    </style>
</head>
<body>

<header>

    <p>Explorez les phénomènes physiques avec des animations interactives.</p>
</header>

    </div>

            <a href="animations/ph/index.html">Échelle de pH</a>

        </div>
    </div>
    <div class="menu-item">ÉNERGIE
        <div class="dropdown">
            <a href="animations/conservation_energie/index.html">Conservation de l'énergie</a> 
        </div>
    </div>
</nav>

</html>
