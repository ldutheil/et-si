<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Échelles du Système Solaire</title>
    <style>
        :root {
            --bg-color: #05070a;
            --ui-bg: rgba(15, 20, 30, 0.95);
            --accent: #00d2ff;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            align-items: center;
        }

        #view-frame {
            position: relative;
            width: 95%;
            max-width: 900px;
            height: 70vh;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: flex-end; 
            padding-bottom: 40px; 
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8);
        }

        #astro-stage {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .astro-object {
            position: absolute;
            border-radius: 50%;
            transition: width 0.1s linear, height 0.1s linear;
            box-sizing: border-box;
            box-shadow: 0 0 20px rgba(0,0,0,0.7);
            border: 1px solid rgba(255,255,255,0.15);
            display: flex;
            justify-content: center;
        }

        .mercure-style { background: radial-gradient(circle at 30% 30%, #a5a5a5, #444); z-index: 10; }
        .mars-style { background: radial-gradient(circle at 30% 30%, #e27b58, #722b18); z-index: 9; }
        .venus-style { background: radial-gradient(circle at 30% 30%, #e3bb76, #835b26); z-index: 8; }
        .terre-style { background: radial-gradient(circle at 30% 30%, #44ccff, #124183); z-index: 7; }
        .neptune-style { background: radial-gradient(circle at 30% 30%, #6081ff, #10216f); z-index: 6; }
        .uranus-style { background: radial-gradient(circle at 30% 30%, #b5e1e2, #457172); z-index: 5; }
        .saturne-style { background: radial-gradient(circle at 30% 30%, #c5ab6e, #654b1e); z-index: 4; }
        .jupiter-style { background: radial-gradient(circle at 30% 30%, #d39c7e, #733c2e); z-index: 3; }
        .sun-style { 
            background: radial-gradient(circle, #fff700 0%, #ffaa00 50%, #ff4400 100%);
            z-index: 2;
        }

        .label {
            position: absolute;
            font-weight: bold;
            text-shadow: 2px 2px 4px black;
            text-transform: uppercase;
            pointer-events: none;
            white-space: nowrap;
            letter-spacing: 1px;
            color: #fff;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .label-external { bottom: 100%; margin-bottom: 8px; }
        .label-internal { top: 15px; }

        .controls {
            width: 100%;
            max-width: 900px;
            background: var(--ui-bg);
            padding: 20px 40px;
            border-radius: 15px 15px 0 0;
            margin-top: auto;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        input[type=range] { width: 100%; cursor: pointer; }

        .info-bar {
            display: flex;
            justify-content: center; /* Centré pour la taille seule */
            color: var(--accent);
            font-weight: bold;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <h1 style="margin: 10px; font-size: 1.4rem;">Comparaison des Diamètres</h1>

    <div id="view-frame">
        <div id="astro-stage"></div>
    </div>

    <div class="controls">
        <div class="info-bar">
            <span id="planet-size">4 879 km</span>
        </div>
        <input type="range" id="zoom-slider" min="0" max="1000" value="0">
        <p style="text-align: center; font-size: 11px; opacity: 0.6; margin: 10px 0 0 0;">
            Dézoomez pour comparer. Terre et Uranus (noms dehors), autres planètes (noms dedans).
        </p>
    </div>

<script>
    const astros = [
        { name: "Mercure", d: 4879, class: "mercure-style", external: false },
        { name: "Mars", d: 6779, class: "mars-style", external: false },
        { name: "Vénus", d: 12104, class: "venus-style", external: false },
        { name: "Terre", d: 12742, class: "terre-style", external: true },
        { name: "Neptune", d: 49244, class: "neptune-style", external: false },
        { name: "Uranus", d: 50724, class: "uranus-style", external: true },
        { name: "Saturne", d: 116460, class: "saturne-style", external: false },
        { name: "Jupiter", d: 139820, class: "jupiter-style", external: false },
        { name: "Soleil", d: 1392700, class: "sun-style", external: false }
    ];

    const stage = document.getElementById('astro-stage');
    const slider = document.getElementById('zoom-slider');
    const sizeLabel = document.getElementById('planet-size');

    astros.forEach(astro => {
        const div = document.createElement('div');
        div.className = 'astro-object ' + astro.class;
        const label = document.createElement('div');
        label.className = 'label ' + (astro.external ? 'label-external' : 'label-internal');
        label.innerText = astro.name;
        div.appendChild(label);
        astro.element = div;
        astro.labelElement = label;
        stage.appendChild(div);
    });

    function update() {
        const val = parseFloat(slider.value);
        const scaleBase = Math.exp(val / 138); 
        const viewportMin = document.getElementById('view-frame').clientHeight * 0.65;

        astros.forEach((astro) => {
            const ratio = astro.d / astros[0].d;
            const size = (viewportMin * ratio) / scaleBase;
            astro.element.style.width = size + "px";
            astro.element.style.height = size + "px";

            if (size > viewportMin * 0.4 && size < viewportMin * 1.6) {
                sizeLabel.innerText = astro.d.toLocaleString() + " km";
            }

            if (size > window.innerWidth * 3.5) {
                astro.element.style.opacity = "0.15";
            } else if (size < 5) {
                astro.element.style.opacity = "0";
            } else {
                astro.element.style.opacity = "1";
            }

            const fontSize = Math.max(10, Math.min(size / 12, 24));
            astro.labelElement.style.fontSize = fontSize + "px";
            
            let isVisible = false;
            if (astro.external) {
                isVisible = (size > 50 && size < document.getElementById('view-frame').clientHeight * 1.5);
            } else {
                isVisible = (size > 80 && size < window.innerWidth * 2);
            }
            astro.labelElement.style.opacity = isVisible ? "1" : "0";
        });
    }

    slider.addEventListener('input', update);
    window.addEventListener('resize', update);
    update();
</script>
</body>
</html>
