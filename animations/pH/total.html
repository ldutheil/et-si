<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulation pH</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 20px;
            background-color: #f5f5f5;
        }
        .container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
        }
        #phSliderContainer {
            width: 300px;
            margin: 20px auto;
        }
        #phSlider {
            width: 100%;
        }
        #phScale {
            display: flex;
            justify-content: space-between;
            margin-top: 5px;
            font-size: 12px;
        }
        #phValue {
            font-size: 24px;
            font-weight: bold;
            margin: 10px;
        }
        #solutionExample {
            font-style: italic;
            color: #555;
            margin-bottom: 20px;
        }
        canvas {
            border: 1px solid #ccc;
            background-color: #e6f2ff; /* Fond bleu clair */
        }
        #legend {
            background: white;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            text-align: left;
        }
        .legend-item {
            display: flex;
            align-items: center;
            margin: 5px 0;
        }
        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <h1>Simulation pH : solution aqueuse - Ions H<sup>+</sup> et HO<sup>-</sup></h1>
    
    <div id="phSliderContainer">
        <input type="range" id="phSlider" min="0" max="14" value="7" step="1">
        <div id="phScale">
            <span>0</span><span>7</span><span>14</span>
        </div>
        <div id="phValue">pH : 7</div>
        <div id="solutionExample">Exemple : Eau pure</div>
    </div>

    <div class="container">
        <canvas id="ionsCanvas" width="500" height="400"></canvas>
        <div id="legend">
            <h3>Légende</h3>
            <div class="legend-item">
                <div class="legend-color" style="background-color: rgba(0, 0, 255, 0.7);"></div>
                <span>Ion H+</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background-color: rgba(255, 0, 0, 0.7);"></div>
                <span>Ion HO-</span>
            </div>
        </div>
    </div>

    <script>
        // --- CONTENU DU FICHIER SCRIPT.JS ---
        
        const slider = document.getElementById('phSlider');
        const phValue = document.getElementById('phValue');
        const solutionExample = document.getElementById('solutionExample');
        const canvas = document.getElementById('ionsCanvas');
        const ctx = canvas.getContext('2d');

        let ions = [];
        let animationId = null;

        const phExamples = {
            0: "Acide chlorhydrique concentré",
            1: "Batterie d'acide de voiture",
            2: "Jus de citron",
            3: "Vinaigre",
            4: "Tomate",
            5: "Café noir",
            6: "Lait",
            7: "Eau pure",
            8: "Œuf cru",
            9: "Bicarbonate de soude",
            10: "Savon à lessive",
            11: "Ammoniaque domestique",
            12: "Eau de Javel",
            13: "Nettoyant pour four",
            14: "Soude caustique"
        };

        class Ion {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.radius = 10;
                this.type = type; 
                this.vx = (Math.random() - 0.5) * 1;
                this.vy = (Math.random() - 0.5) * 1;
            }

            draw() {
                ctx.fillStyle = this.type === 'H+' ? 'rgba(0, 0, 255, 0.7)' : 'rgba(255, 0, 0, 0.7)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = 'white';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                if (this.type === 'H+') {
                    ctx.font = 'bold 8px Arial';
                    ctx.fillText('H', this.x, this.y);
                    ctx.fillText('+', this.x + 3, this.y - 6);
                } else {
                    ctx.font = 'bold 8px Arial';
                    ctx.fillText('HO', this.x, this.y);
                    ctx.fillText('-', this.x + 5, this.y - 6);
                }
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < this.radius || this.x > canvas.width - this.radius) this.vx *= -1;
                if (this.y < this.radius || this.y > canvas.height - this.radius) this.vy *= -1;
            }
        }

        function initIons(pH) {
            ions = [];
            const totalIons = 30;
            const hCount = Math.round(totalIons * (14 - pH) / 14);
            const ohCount = totalIons - hCount;

            for (let i = 0; i < hCount; i++) {
                ions.push(new Ion(30 + Math.random() * (canvas.width - 60), 30 + Math.random() * (canvas.height - 60), 'H+'));
            }
            for (let i = 0; i < ohCount; i++) {
                ions.push(new Ion(30 + Math.random() * (canvas.width - 60), 30 + Math.random() * (canvas.height - 60), 'HO-'));
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ions.forEach(ion => {
                ion.update();
                ion.draw();
            });
            animationId = requestAnimationFrame(animate);
        }

        slider.addEventListener('input', () => {
            const pH = parseInt(slider.value);
            phValue.textContent = `pH : ${pH}`;
            solutionExample.textContent = `Exemple : ${phExamples[pH]}`;
            initIons(pH);
            if (animationId) cancelAnimationFrame(animationId);
            animate();
        });

        initIons(7);
        solutionExample.textContent = `Exemple : ${phExamples[7]}`;
        animate();
    </script>
</body>
</html>
