<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulation pH</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 20px;
            background-color: #f5f5f5;
        }
        .container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
        }
        #phSliderContainer {
            width: 300px;
            margin: 20px auto;
        }
        #phSlider {
            width: 100%;
        }
        #phScale {
            display: flex;
            justify-content: space-between;
            margin-top: 5px;
            font-size: 12px;
        }
        #phValue {
            font-size: 24px;
            font-weight: bold;
            margin: 10px;
        }
        #solutionExample {
            font-style: italic;
            color: #555;
            margin-bottom: 20px;
        }
        canvas {
            border: 1px solid #ccc;
            background-color: #e6f2ff; /* Fond bleu clair */
        }
        #legend {
            background: white;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            text-align: left;
        }
        .legend-item {
            display: flex;
            align-items: center;
            margin: 5px 0;
        }
        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <h1>Simulation pH : solution aqueuse - Ions H<sup>+</sup> et HO<sup>-</sup></h1>
    <div id="phSliderContainer">
        <input type="range" id="phSlider" min="0" max="14" value="7" step="1">
        <div id="phScale">
            <span>0</span><span>7</span><span>14</span>
        </div>
        <div id="phValue">pH : 7</div>
        <div id="solutionExample">Exemple : Eau pure</div>
    </div>
    <div class="container">
        <canvas id="ionsCanvas" width="500" height="400"></canvas>
        <div id="legend">
            <h3>Légende</h3>
            <div class="legend-item">
                <div class="legend-color" style="background-color: rgba(0, 0, 255, 0.7);"></div>
                <span>Ion H+</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background-color: rgba(255, 0, 0, 0.7);"></div>
                <span>Ion HO-</span>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
