<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spectre sonore</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="main-header">
        <h1>Et si on explorait les fréquences sonores ?</h1>
    </header>

    <div id="main-container">
        <div id="left-panel">
            <div class="control-group">
                <h3>CONTRÔLE DE LA FRÉQUENCE</h3>
                <div style="margin-bottom: 10px; text-align: center;">
                    <input type="number" id="freqManual" min="5" max="25000" value="440" 
                           style="background: #1e293b; color: #38bdf8; border: 1px solid #334155; padding: 5px; border-radius: 4px; width: 90px; text-align: center; font-family: monospace; font-size: 1rem;">
                    <span style="color: #94a3b8; font-size: 0.8rem;">Hz</span>
                </div>
                <div id="audioSliderContainer" style="display: flex; flex-direction: column; align-items: center; height: 200px; justify-content: center;">
                    <input type="range" id="freqSlider" min="5" max="25000" value="440" step="5" orient="vertical" style="flex: 1; cursor: pointer; height: 100%;">
                </div>
            </div>
            <div class="instruction-box">
                <button id="toggleAudio" class="usage-btn">▶ JOUER LE SON</button>
            </div>
        </div>

        <div id="builder-zone">
            <canvas id="soundCanvas"></canvas>
        </div>

        <div id="info-zone">
            <h1 id="info-title">INFORMATIONS</h1>
            
            <div class="data-card highlight">
                <span class="label">CATÉGORIE</span>
                <span class="value" id="categoryValue">Son Audible</span>
            </div>

            <div class="data-card">
                <span class="label">FRÉQUENCE ACTUELLE</span>
                <span class="value" id="exampleValue" style="color: #38bdf8;">440 Hz (La 4)</span>
            </div>

            <div class="data-divider"></div>

            <div id="legend">
                <button id="usageTableBtn" class="usage-btn">📊 Voir le tableau des fréquences</button>
            </div>

            <div id="usageModal" class="modal">
                <div class="modal-content">
                    <span class="close-btn">&times;</span>
                    <h2>Utilisations des Fréquences Sonores</h2>
                    <table id="usageTable">
                        <thead>
                            <tr>
                                <th>Domaine</th>
                                <th>Fréquence (Hz)</th>
                                <th>Exemples & Usages</th>
                            </tr>
                        </thead>
                        <tbody>
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
