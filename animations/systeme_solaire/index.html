<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Système Solaire - Distances Réelles</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="main-header">
        <h1>ET SI ON ARRIVAIT EN FUSÉE SUR LE SYSTÈME SOLAIRE ?</h1>
    </header>

    <div id="main-container">
        <div id="left-panel">
            <div class="control-group">
                <h3>DÉZOOM</h3>
                <label for="zoomRange" style="font-size: 0.8rem; color: #94a3b8; display: block; margin-bottom: 10px;">
                    Ajuste la distance d'observation
                </label>
                <input type="range" id="zoomRange" min="10" max="1200" value="100" style="width: 100%;">
            </div>

            <div class="control-group">
                <h3>CHOIX DE L'UNITÉ</h3>
                <label class="checkbox-container">
                    <input type="checkbox" id="unitToggle">
                    <span class="checkbox-label">Afficher les distances en Kilomètres</span>
                </label>
            </div>

            <div class="instruction-box">
                <b>Échelle :</b> Les distances au Soleil sont fidèles à la réalité. <br><br>
                La taille des planètes n'est pas à l'échelle. <br><br>
                1 UA = distance Terre-Soleil ≈ 150 000 000 km.
            </div>
        </div>

        <div id="builder-zone">
            <canvas id="solarCanvas"></canvas>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
