<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Système Solaire - Échelle Dynamique</title>
    <style>
        body { margin: 0; background-color: #050505; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        canvas { display: block; }
        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(20, 20, 20, 0.8);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #333;
            width: 250px;
        }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #6081FF; }
        label { display: block; margin-bottom: 8px; font-size: 0.9em; font-weight: bold; }
    </style>
    <link rel="icon" type="image/png" href="../../favicon.png">
</head>
<body>

    <div class="controls">
        <label>Dézoomer vers les confins</label>
        <input type="range" id="zoomRange" min="5" max="5000" value="100">
    </div>

    <canvas id="solarCanvas"></canvas>

    <script src="script.js"></script>
</body>
</html>
