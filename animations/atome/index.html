<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atome Builder Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-scaler">
        <header id="main-header">
            <h1>CONSTRUIRE UN ATOME</h1>
        </header>

        <div id="main-container">
            <div id="left-sidebar">
                <div id="periodic-table"></div>
                <button id="btn-full-table">TABLEAU COMPLET</button>
            </div>

            <div id="builder-zone">
                <canvas id="atomCanvas" width="500" height="500"></canvas>
                <div id="controls"></div>
            </div>

            <div id="info-zone">
                <h1 id="atom-name-title">VIDE</h1>
                <div id="stability-info"></div>
                <div id="notation-container"></div>
                <canvas id="gauge-canvas" width="220" height="180"></canvas>
            </div>
        </div>
    </div>

    <div id="modal-table">
        <div id="modal-content">
            <span id="close-modal">&times;</span>
            <h2>CLASSIFICATION PÉRIODIQUE</h2>
            <div id="full-table-grid"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
