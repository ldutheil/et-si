<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Construction d'atomes</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="../../favicon.png">
</head>
<body>
    <header id="main-header">
        <h1>Et si on construisait un atome ?</h1>
    </header>

    <div id="main-container">
        <div id="periodic-table"></div>

        <div id="builder-zone">
            <canvas id="atomCanvas" width="500" height="500"></canvas>
            <div id="controls"></div>
        </div>

        <div id="info-zone">
            <h1 id="atom-name-title">VIDE</h1>
            <div id="notation-container"></div>
            <canvas id="gauge-canvas" width="220" height="180"></canvas>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
